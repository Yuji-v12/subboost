name: Build Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  # GHCR requires lowercase owner/name
  IMAGE_NAME: ghcr.io/yuji-v12/subboost

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ github.ref_name }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: local/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_RELEASE_VERSION=${{ github.ref_name }}
            APP_BUILD_SHA=${{ github.sha }}
            APP_VERSION=${{ github.sha }}
            APP_VERSION_TOKEN=${{ github.sha }}
          cache-from: type=gha,scope=selfhost-amd64
          cache-to: type=gha,mode=max,scope=selfhost-amd64
          provenance: false
